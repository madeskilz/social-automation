name: Post Tweet via Composio

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find correct Twitter action name
        run: |
          echo "=== Available Twitter actions ==="
          curl -s \
            "https://backend.composio.dev/api/v2/actions?appNames=twitter&limit=20" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}" | jq -r '.items[].name // .items[].slug // .items[].enum // empty' 2>/dev/null || \
          curl -s \
            "https://backend.composio.dev/api/v2/actions?appNames=twitter&limit=20" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}" | jq '.'

      - name: Post to Twitter via Composio
        run: |
          CONNECTED_ID="5f0e4f78-65e7-4214-914f-bd38198e68d2"
          TWEET_TEXT=$(jq -r '.text' tweets/queue.json)
          echo "Tweet: $TWEET_TEXT"

          for ACTION in "TWITTER_CREATION_OF_A_POST" "TWITTER_CREATE_POST" "TWITTER_POST_TWEET" "TWITTER_TWEETS_CREATE"; do
            echo "=== Trying action: $ACTION ==="
            RESPONSE=$(curl -s -w "\n---HTTP_STATUS:%{http_code}" \
              -X POST "https://backend.composio.dev/api/v2/actions/$ACTION/execute" \
              -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"connectedAccountId\": \"$CONNECTED_ID\", \"input\": {\"text\": $(jq '.text' tweets/queue.json)}}")

            echo "RESPONSE: $RESPONSE"
            HTTP_STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)

            if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
              echo "SUCCESS with action: $ACTION"
              exit 0
            fi

            if ! echo "$RESPONSE" | grep -q "not found"; then
              echo "Action $ACTION exists but had a different error — stopping here"
              exit 1
            fi
          done

          echo "No working action found"
          exit 1
