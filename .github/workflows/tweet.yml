name: Post Tweet — Direct Twitter API

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tweepy
        run: pip install tweepy --quiet

      - name: Post Tweet
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python3 - <<'EOF'
          import tweepy, json, os, sys

          with open('tweets/queue.json') as f:
              data = json.load(f)

          tweet_text = data.get('text', '').strip()

          if not tweet_text:
              print("No tweet text. Skipping.")
              sys.exit(0)

          if data.get('status') == 'posted':
              print("Already posted. Skipping.")
              sys.exit(0)

          print(f"Posting: {tweet_text[:80]}...")

          client = tweepy.Client(
              consumer_key=os.environ['TWITTER_API_KEY'],
              consumer_secret=os.environ['TWITTER_API_SECRET'],
              access_token=os.environ['TWITTER_ACCESS_TOKEN'],
              access_token_secret=os.environ['TWITTER_ACCESS_TOKEN_SECRET']
          )

          response = client.create_tweet(text=tweet_text)
          print(f"SUCCESS! Tweet ID: {response.data['id']}")
          EOF
