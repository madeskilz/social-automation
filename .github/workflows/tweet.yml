name: Post Tweet via Composio

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Twitter via Composio
        run: |
          echo "=== STEP 1: List connected accounts ==="
          ACCOUNTS=$(curl -s \
            "https://backend.composio.dev/api/v1/connectedAccounts" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}")
          echo "ACCOUNTS: $ACCOUNTS"

          # Extract UUID for Twitter account
          CONNECTED_ID=$(echo "$ACCOUNTS" | jq -r '.items[] | select(.appName=="twitter" or .toolType=="twitter" or .appUniqueId=="twitter") | .id' | head -1)

          echo "=== Twitter UUID: $CONNECTED_ID ==="

          if [ -z "$CONNECTED_ID" ]; then
            echo "Twitter UUID not found — printing all account ids for debug:"
            echo "$ACCOUNTS" | jq -r '.items[] | "\(.id) | \(.appName) | \(.toolType)"'
            exit 1
          fi

          echo "=== STEP 2: Post tweet ==="
          TWEET_TEXT=$(jq -r '.text' tweets/queue.json)
          echo "Tweet: $TWEET_TEXT"

          RESPONSE=$(curl -s -w "\n---HTTP_STATUS:%{http_code}" \
            -X POST "https://backend.composio.dev/api/v2/actions/TWITTER_CREATE_POST/execute" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"connectedAccountId\": \"$CONNECTED_ID\", \"input\": {\"text\": $(jq '.text' tweets/queue.json)}}")

          echo "RESPONSE: $RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          echo "HTTP STATUS: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
            echo "TWEET POSTED SUCCESSFULLY!"
          else
            echo "TWEET FAILED"
            exit 1
          fi
