name: Post Tweet via Composio

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read tweet text
        id: tweet
        run: |
          TEXT=$(jq -r '.text' tweets/queue.json)
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "=============================="
          echo "TWEET TEXT:"
          echo "$TEXT"
          echo "=============================="

      - name: Post to Twitter via Composio
        run: |
          echo "=============================="
          echo "CALLING COMPOSIO API..."
          echo "=============================="

          RESPONSE=$(curl -s -w "\n---HTTP_STATUS:%{http_code}" \
            -X POST "https://backend.composio.dev/api/v2/actions/TWITTER_CREATE_POST/execute" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data-raw "{\"connectedAccountId\": \"${{ secrets.COMPOSIO_ACCOUNT_ID }}\", \"input\": {\"text\": $(jq '.text' tweets/queue.json)}}")

          echo "FULL RESPONSE:"
          echo "$RESPONSE"
          echo "=============================="

          HTTP_STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          echo "HTTP STATUS: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
            echo "TWEET POSTED SUCCESSFULLY!"
          else
            echo "TWEET FAILED — check response above"
            exit 1
          fi
