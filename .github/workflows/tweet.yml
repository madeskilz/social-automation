name: Post Tweet — Direct Twitter API

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tweepy
        run: pip install tweepy --quiet

      - name: Post Tweet
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python3 - <<'EOF'
          import tweepy, json, os, sys

          with open('tweets/queue.json') as f:
              data = json.load(f)

          tweet_text = data.get('text', '').strip()
          print(f"Posting: {tweet_text[:80]}...")

          client = tweepy.Client(
              consumer_key=os.environ['TWITTER_API_KEY'],
              consumer_secret=os.environ['TWITTER_API_SECRET'],
              access_token=os.environ['TWITTER_ACCESS_TOKEN'],
              access_token_secret=os.environ['TWITTER_ACCESS_TOKEN_SECRET']
          )

          try:
              response = client.create_tweet(text=tweet_text)
              print(f"SUCCESS! Tweet ID: {response.data['id']}")
          except tweepy.errors.Forbidden as e:
              print(f"403 Forbidden — Full error: {e.response.text}")
              sys.exit(1)
          except tweepy.errors.Unauthorized as e:
              print(f"401 Unauthorized — Full error: {e.response.text}")
              sys.exit(1)
          except Exception as e:
              print(f"Error: {type(e).__name__}: {e}")
              if hasattr(e, 'response') and e.response is not None:
                  print(f"Response body: {e.response.text}")
              sys.exit(1)
          EOF
