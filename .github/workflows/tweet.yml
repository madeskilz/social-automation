name: Post Tweet via Composio

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Twitter via Composio
        run: |
          echo "=============================="
          echo "STEP 1: Fetch Twitter connected account UUID"
          echo "=============================="

          ACCOUNTS=$(curl -s \
            "https://backend.composio.dev/api/v1/connectedAccounts?toolType=twitter" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}")

          echo "Accounts response: $ACCOUNTS"

          CONNECTED_ID=$(echo "$ACCOUNTS" | jq -r '.items[0].id // empty')

          if [ -z "$CONNECTED_ID" ]; then
            echo "Could not find connected account UUID. Trying entityId fallback..."
            USE_ENTITY=true
          else
            echo "Found UUID: $CONNECTED_ID"
            USE_ENTITY=false
          fi

          echo "=============================="
          echo "STEP 2: Post tweet"
          echo "=============================="

          TWEET_TEXT=$(jq '.text' tweets/queue.json)
          echo "Tweet: $TWEET_TEXT"

          if [ "$USE_ENTITY" = true ]; then
            PAYLOAD="{\"entityId\": \"default\", \"input\": {\"text\": $TWEET_TEXT}}"
          else
            PAYLOAD="{\"connectedAccountId\": \"$CONNECTED_ID\", \"input\": {\"text\": $TWEET_TEXT}}"
          fi

          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n---HTTP_STATUS:%{http_code}" \
            -X POST "https://backend.composio.dev/api/v2/actions/TWITTER_CREATE_POST/execute" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data-raw "$PAYLOAD")

          echo "=============================="
          echo "FULL RESPONSE:"
          echo "$RESPONSE"
          echo "=============================="

          HTTP_STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          echo "HTTP STATUS: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
            echo "TWEET POSTED SUCCESSFULLY!"
          else
            echo "TWEET FAILED — check response above"
            exit 1
          fi
