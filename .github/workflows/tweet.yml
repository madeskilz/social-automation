name: Post Tweet via Composio

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Twitter via Composio v3
        run: |
          TWEET_TEXT=$(jq -r '.text' tweets/queue.json)

          echo "=============================="
          echo "TWEET: $TWEET_TEXT"
          echo "=============================="

          RESPONSE=$(curl -s -w "\n---HTTP_STATUS:%{http_code}" \
            -X POST "https://backend.composio.dev/api/v3/tools/execute" \
            -H "x-api-key: ${{ secrets.COMPOSIO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"slug\": \"TWITTER_CREATE_POST\",
              \"entityId\": \"default\",
              \"arguments\": {
                \"text\": $(jq '.text' tweets/queue.json)
              }
            }")

          echo "RESPONSE: $RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          echo "HTTP STATUS: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
            echo "TWEET POSTED SUCCESSFULLY!"
          else
            echo "TWEET FAILED"
            exit 1
          fi
