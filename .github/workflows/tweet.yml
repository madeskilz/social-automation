name: Post Tweet via Composio

on:
  push:
    paths:
      - 'tweets/queue.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post Tweet
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_ACCOUNT_ID: ${{ secrets.COMPOSIO_ACCOUNT_ID }}
        run: |
          python3 - <<'EOF'
          import json, requests, sys, os

          with open('tweets/queue.json') as f:
              data = json.load(f)

          tweet_text = data.get('text', '').strip()
          status = data.get('status', '')

          if not tweet_text:
              print("No tweet text found. Skipping.")
              sys.exit(0)

          if status == 'posted':
              print("Already posted. Skipping.")
              sys.exit(0)

          api_key = os.environ['COMPOSIO_API_KEY']
          account_id = os.environ['COMPOSIO_ACCOUNT_ID']

          print(f"Posting: {tweet_text[:80]}...")

          resp = requests.post(
              'https://backend.composio.dev/api/v2/actions/TWITTER_CREATE_POST/execute',
              headers={
                  'x-api-key': api_key,
                  'Content-Type': 'application/json'
              },
              json={
                  'connectedAccountId': account_id,
                  'input': {'text': tweet_text}
              }
          )

          print(f"Status: {resp.status_code}")
          print(f"Response: {resp.text}")

          if resp.status_code in (200, 201):
              resp_data = resp.json()
              if resp_data.get('successful') or resp_data.get('data'):
                  print("Tweet posted successfully!")
              else:
                  print(f"Composio returned error: {resp_data}")
                  sys.exit(1)
          else:
              print("Tweet failed.")
              sys.exit(1)
          EOF
